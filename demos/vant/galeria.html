<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Galeria - Vant</title>
<meta name="description" content="Galeria de apresentações Vant com identidades visuais navegáveis.">
<link rel="icon" href="static/img/favicon.svg">
<link rel="stylesheet" href="../../assets/vendor/inter.css">
<link rel="stylesheet" href="static/css/vant.css">
<script src="../../scripts/core/form-accessibility.js?v=20260711-2" defer></script>
</head>
<body>
<main>
  <section class="section wrap gallery-hero-vant">
    <div class="section-head center reveal-up">
      <div class="eyebrow">Galeria</div>
      <h1 class="h1">Decks com identidade própria.</h1>
      <p class="lead">Exemplos navegáveis, responsivos e prontos para abrir em tela cheia. Cada deck usa uma linguagem visual diferente.</p>
    </div>
  </section>
  <section class="wrap gallery-shell-vant">
    <div class="filters" id="filters"></div>
    <div class="gallery-grid" id="gallery"></div>
  </section>
</main>
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-inner modal-inner-vant">
    <div class="modal-frame-wrap"><iframe id="modalFrame" title="Apresentação Vant"></iframe></div>
    <aside class="modal-side">
      <div class="cat" id="mCat"></div>
      <h3 id="mTitle"></h3>
      <p id="mDesc"></p>
      <div class="ex-tags" id="mTags"></div>
      <div class="hint">Use setas para navegar, F para tela cheia e E para editar textos dentro do deck.</div>
      <a class="btn btn-accent btn-sm" id="mOpen" target="_blank" rel="noopener">Abrir em tela cheia</a>
      <button class="btn btn-ghost btn-sm" id="modalClose2">Fechar</button>
    </aside>
    <button class="modal-close" id="modalClose" aria-label="Fechar">?</button>
  </div>
</div>
<script src="../../assets/vendor/gsap.min.js"></script>
<script src="../../assets/vendor/ScrollTrigger.min.js"></script>
<script src="../../assets/vendor/lenis.min.js"></script>
<script src="static/js/vant.js"></script>
<script>
const $ = s => document.querySelector(s);
let examples = [], filter = 'Todos';
const rgb = hex => [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',');
function esc(s){ return Vant.esc(s || ''); }
function filtered(){ return filter === 'Todos' ? examples : examples.filter(e => e.categoria === filter); }
function renderFilters(){
  const cats = ['Todos', ...new Set(examples.map(e => e.categoria))];
  $('#filters').innerHTML = cats.map(c => '<button class="chip '+(c===filter?'active':'')+'" data-filter="'+esc(c)+'">'+esc(c)+'</button>').join('');
  $('#filters').querySelectorAll('button').forEach(b => b.onclick = () => { filter = b.dataset.filter; renderFilters(); renderCards(); });
}
function renderCards(){
  $('#gallery').innerHTML = filtered().map((e, i) => '<article class="deck-card glass reveal-up" style="--a:'+esc(e.accent)+';--delay:'+(i*40)+'ms"><button class="deck-open" data-i="'+examples.indexOf(e)+'"><span class="deck-thumb"><iframe src="exemplos/'+esc(e.arquivo)+'" tabindex="-1" loading="lazy"></iframe><span class="deck-badge">'+esc(e.categoria)+'</span></span><span class="deck-meta"><h3>'+esc(e.titulo)+'</h3><p>'+esc(e.descricao)+'</p><span class="deck-line"><span>'+esc(e.cor_nome)+'</span><span>'+e.n_slides+' slides</span></span></span></button></article>').join('');
  $('#gallery').querySelectorAll('[data-i]').forEach(b => b.onclick = () => openDeck(examples[+b.dataset.i]));
  Vant.revelar();
}
function openDeck(e){
  const url = 'exemplos/' + e.arquivo;
  const inner = document.querySelector('.modal-inner');
  inner.style.setProperty('--modal-accent', e.accent + '99');
  inner.style.setProperty('--modal-glow-rgb', rgb(e.accent));
  $('#modalFrame').src = url; $('#mOpen').href = url;
  $('#mCat').textContent = e.categoria; $('#mCat').style.color = e.accent;
  $('#mTitle').textContent = e.titulo; $('#mDesc').textContent = e.descricao;
  $('#mTags').innerHTML = '<span class="tag"><span class="swatch" style="background:'+e.accent+'"></span>'+esc(e.cor_nome)+'</span><span class="tag">'+esc(e.vibe)+'</span><span class="tag">'+e.n_slides+' slides</span>';
  $('#modal').classList.add('show'); $('#modal').setAttribute('aria-hidden','false'); document.body.style.overflow='hidden';
}
function closeDeck(){ $('#modal').classList.remove('show'); $('#modal').setAttribute('aria-hidden','true'); $('#modalFrame').src='about:blank'; document.body.style.overflow=''; }
$('#modalClose').onclick = closeDeck; $('#modalClose2').onclick = closeDeck; $('#modal').onclick = e => { if(e.target.id === 'modal') closeDeck(); }; addEventListener('keydown', e => { if(e.key === 'Escape') closeDeck(); });
(async()=>{ Vant.initPagina(); examples = await fetch('exemplos/index.json').then(r=>r.json()); renderFilters(); renderCards(); Vant.montarFooter(); })();
</script>
<script src="/scripts/demo-back-button.js" defer></script>
</body>
</html>
