<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Criar conta - Vant</title><link rel="icon" href="static/img/favicon.svg"><link rel="stylesheet" href="../../assets/vendor/inter.css"><link rel="stylesheet" href="static/css/vant.css"></head><body><main><section class="section wrap auth-wrap"><div class="auth-card glass"><img class="brand-logo" src="static/img/logo.png" alt="Vant"><h1 class="h2">Criar conta grátis</h1><p class="muted">Ganhe 100 pontos para testar o gerador.</p><form id="form"><input class="input" id="nome" placeholder="Seu nome" required><input class="input" id="email" type="email" placeholder="seu@email.com" required><input class="input" id="senha" type="password" placeholder="mínimo 6 caracteres" minlength="6" required><button class="btn btn-accent btn-block">Criar conta</button></form><div class="auth-foot">Já tem conta? <a href="entrar.html">Entrar</a></div></div></section></main><script src="static/js/vant.js"></script><script>Vant.montarBg();document.getElementById('form').onsubmit=e=>{e.preventDefault();Vant.saveUser({nome:nome.value,email:email.value,pontos:100,plano:'Free'});location.href='painel.html'};</script></body></html>
